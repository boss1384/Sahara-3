<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahara Flash - Score & Live Video</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Sahara <span>Flash</span></h1>
            <p>Score & Live Video</p>
        </div>
        
        <nav>
            <ul>
                <li onclick="showSection('live')">Live</li>
                <li onclick="showSection('fixtures')">Fixtures</li>
                <li onclick="showSection('standings')">Standings</li>
                <li onclick="showSection('rounds')">Rounds</li>
                <li onclick="showSection('news')">News</li>
            </ul>
        </nav>
        
        <div class="search">
            <input type="text" id="searchInput" placeholder="Search teams..." onkeyup="if(event.key==='Enter') searchTeams()">
        </div>
    </header>

    <main>
        <!-- Live -->
        <section id="live-section" class="section active">
            <h2><i class="fas fa-broadcast-tower"></i> Live Matches</h2>
            <div id="live-matches" class="matches-grid"></div>
        </section>

        <!-- Fixtures -->
        <section id="fixtures-section" class="section">
            <h2>Upcoming Fixtures</h2>
            <div id="fixtures" class="matches-grid"></div>
        </section>

        <!-- Standings -->
        <section id="standings-section" class="section">
            <h2>League Standings</h2>
            <select id="league-select" onchange="loadStandings()"></select>
            <table id="standings-table">
                <thead>
                    <tr>
                        <th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
                    </tr>
                </thead>
                <tbody id="standings-body"></tbody>
            </table>
        </section>

        <!-- Rounds -->
        <section id="rounds-section" class="section">
            <h2>Match Rounds</h2>
            <div id="rounds-content">Select a league to view rounds</div>
        </section>

        <!-- News -->
        <section id="news-section" class="section">
            <h2>Latest News</h2>
            <div id="news-content">Football news will appear here...</div>
        </section>

        <!-- Match Detail Modal -->
        <div id="team-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">×</span>
                <div id="modal-team-header"></div>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab(0)">Live Video</button>
                    <button class="tab-btn" onclick="switchTab(1)">Lineup</button>
                    <button class="tab-btn" onclick="switchTab(2)">Stats</button>
                    <button class="tab-btn" onclick="switchTab(3)">Events</button>
                    <button class="tab-btn" onclick="switchTab(4)">Odds</button>
                    <button class="tab-btn" onclick="switchTab(5)">Preview</button>
                </div>

                <div id="tab-video" class="tab-content active">
                    <iframe id="live-video" width="100%" height="520" frameborder="0" allowfullscreen></iframe>
                </div>
                <div id="tab-lineup" class="tab-content"><div id="lineup-content"></div></div>
                <div id="tab-stats" class="tab-content"><div id="stats-content" class="stats-grid"></div></div>
                <div id="tab-events" class="tab-content"><div id="events-content"></div></div>
                <div id="tab-odds" class="tab-content"><div id="odds-content"></div></div>
                <div id="tab-preview" class="tab-content"><div id="preview-content"></div></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
